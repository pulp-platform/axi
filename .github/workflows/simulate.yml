name: Simulate

on:
  push:
    branches-ignore:
      - gh-pages
      - v**
  pull_request:
    branches-ignore:
      - gh-pages
      - v**

jobs:
  verilator-sim:
    name: Verilator sim (${{ matrix.test }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test:
          - axi_addr_test # sim error, needs debug
          - axi_atop_filter
          - axi_bus_compare
          # - axi_cdc # Function Argument expects a CLASSREFDTYPE 'axi_ax_beat__I4_U2', got CLASSREFDTYPE 'axi_ax_beat'
          - axi_delayer
          # - axi_dw_downsizer # CLASSREFDTYPE parameterized-class binding error
          # - axi_dw_upsizer # CLASSREFDTYPE parameterized-class binding error
          - axi_fifo
          - axi_isolate
          # - axi_iw_converter # CLASSREFDTYPE parameterized-class binding error
          - axi_lite_dw_converter
          - axi_lite_mailbox
          - axi_lite_regs
          - axi_lite_to_apb
          - axi_lite_to_axi
          - axi_lite_xbar
          # - axi_modify_address # CLASSREFDTYPE parameterized-class binding error
          - axi_serializer
          - axi_sim_mem
          - axi_slave_compare
          - axi_to_axi_lite
          - axi_to_mem_banked
          # - axi_xbar # only 1x1 config has no CLASSREFDTYPE parameterized-class binding error

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install z3
        run: sudo apt-get update && sudo apt-get install -y z3

      - name: Install Bender
        uses: pulp-platform/pulp-actions/bender-install@v2.5.0
        with:
          version: 0.31.0

      - name: Install verilator
        uses: veryl-lang/setup-verilator@v2

      - name: Bender checkout
        run: bender checkout

      - name: Run Verilator sim
        run: scripts/run_verilator_sim.sh ${{ matrix.test }}
